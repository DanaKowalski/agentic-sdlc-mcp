name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check MCP server
        run: npx tsc -p mcp-server/tsconfig.json --noEmit

      - name: Build MCP server
        run: npm run build

      - name: Check configs in sync
        run: npm run check:configs
